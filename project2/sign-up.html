<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="sign-up.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
      <!-- login form -->
        <div class="login">
            <div class="container">
                <div class="box">
                    <div class="inner-box">
                        <div class="sign-in">Đăng ký</div>
                        <p class="content">
                            Tạo một tài khoản để tiếp tục
                        </p>
                        <div class="use-name">Họ và tên</div>
                        <input
                            type="text"
                            placeholder="Ví dụ: Lê Văn A"
                            class="input" />

                        <div class="email">Email</div>
                        <input
                            type="email"
                            placeholder="Ví dụ: levana@gmail.com"
                            class="input"
                        />

                        <div class="password">Mật khẩu</div>
                        <input
                            type="password"
                            placeholder="Mật khẩu"
                            class="input"
                        />
                        
                        <label for="birthDate">Ngày sinh:</label>
                        <input type="date" id="birthDate" name="birthDate" required />
                        <button>Đăng ký <a href="#"></a></button>
                        <div class="inner-forget">
                            <div class="taikhoan">Bạn đã có tài khoản?</div>
                            <div class="dangky">
                                <a href="login.html">Đăng nhập</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           <a a href="index.html"> <div class="back"> Back</div></a>
        </div>
</body>
</html>
