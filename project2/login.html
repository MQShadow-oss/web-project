<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="login.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <title>Login</title>
    </head>
    <body>
        <!-- login form -->
        <div class="login">
            <div class="container">
                <div class="box">
                    <div class="inner-box">
                        <div class="sign-in">Đăng nhập</div>
                        <div class="email">Tài khoản</div>
                        <input
                            type="email"
                            placeholder="Ví dụ: levana@gmail.com"
                            class="input"
                        />

                        <div class="password">Mật khẩu</div>
                        <input
                            type="password"
                            placeholder="Mật khẩu"
                            class="input"
                        />
                        <div class="note-pass">
                            <div class="note">Nhớ mật khẩu</div>
                            <div class="forget-pass">Quên mật khẩu?</div>
                        </div>
                        <button>Đăng nhập <a href="#"></a></button>
                        <div class="inner-forget">
                            <div class="dangky">
                                <a href="sign-up.html">Tạo tài khoản</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- end login form  -->
         <a href="index.html"><button class="Home1">Home</button></a>
    </body>
</html>
